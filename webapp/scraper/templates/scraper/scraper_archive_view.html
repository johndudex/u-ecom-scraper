{% extends "scraper/base.html" %}

{% block page_title %}{{ filename }} — {{ site.slug }} — Scraper Console{% endblock %}

{% block content %}

<div class="flex items-center justify-between mb-6">
    <div>
        <div class="flex items-center gap-3 mb-1">
            <a href="{% url 'site_detail' site_id=site.id %}" class="text-xs text-ink-muted hover:text-ink-secondary transition-colors">&larr; {{ site.slug }}</a>
            <span class="text-line-strong">/</span>
            <span class="text-sm font-medium text-ink font-mono">{{ filename }}</span>
        </div>
        <p class="text-xs text-ink-muted">{{ code|length }} characters</p>
    </div>
    <a href="{{ download_url }}" class="btn-secondary">Download</a>
</div>

<div class="panel overflow-hidden">
    <pre class="text-xs text-ink-secondary font-mono whitespace-pre-wrap break-all leading-relaxed max-h-[75vh] overflow-y-auto scrollbar-thin p-4">{{ code }}</pre>
</div>

{% endblock %}
